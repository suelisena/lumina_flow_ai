<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaFlow AI - Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { max-width: 800px; margin: 30px auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        .chat-header { background: #006437; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #ffd700; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #ffffff; }
        .message { margin-bottom: 20px; max-width: 80%; padding: 12px 18px; border-radius: 20px; position: relative; line-height: 1.5; }
        .user-message { background: #e2e8f0; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; color: #1a202c; }
        .ai-message { background: #006437; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-group { padding: 17px; background: #f8f9fa; border-top: 1px solid #dee2e6; }
        #user-input { border-radius: 25px; padding: 12px 20px; border: 1px solid #cbd5e0; }
        .btn-send { border-radius: 50%; width: 50px; height: 50px; margin-left: 10px; background: #006437; color: white; border: none; transition: 0.3s; }
        .btn-send:hover { background: #004d2a; transform: scale(1.1); }
        .chat-header {padding: 15px 20px; background-color: #006437; color: white; border-radius: 10px 10px 0 0;}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-robot"></i> LuminaFlow AI</h3>
            <small>Sueli Sena - Systems Analyst Specialist</small>
        </div>
        
        <a href="/dashboard" class="btn btn-outline-light btn-sm shadow-sm">
            <i class="bi bi-graph-up"></i> Ver Dashboard
        </a>
    </div>
        
        <div id="chat-box" class="chat-box d-flex flex-column">
            <div class="message ai-message">
                Olá Sueli! Sou a Lumina. Como posso ajudar com seus leads hoje?
            </div>
        </div>

        <div class="input-group">
        <input type="text" id="user-input" class="form-control" placeholder="Digite sua mensagem aqui..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button class="btn-send" onclick="sendMessage()" style="margin-left: 1%;"><i class="bi bi-send-fill"></i></button>
    </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

           
            chatBox.innerHTML += `<div class="message user-message"><b>Você:</b> ${input.value}</div>`;
            const text = input.value;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
              
                chatBox.innerHTML += `<div class="message ai-message"><b>Lumina:</b> ${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="message ai-message text-danger">Erro ao conectar com o servidor.</div>`;
            }
        }
    </script>
</body>
</html>
